services:
  - type: web
    name: house-hunt-helper
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      # Optional: set DATABASE_URL in the Render dashboard to use external Postgres.
      # When DATABASE_URL is present, the app prefers Postgres and ignores DATABASE_PATH.
      - key: DATABASE_PATH
        value: /var/data/house_hunt.sqlite
    disk:
      name: house-hunt-data
      mountPath: /var/data
      sizeGB: 1
